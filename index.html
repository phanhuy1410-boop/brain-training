<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Brain Training">
<title>Brain Training</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAFAF8; color: #1A1A1A; max-width: 420px; margin: 0 auto; padding-bottom: 2rem; padding-top: env(safe-area-inset-top); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #3C3489; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 999; max-width: 90%; text-align: center; display: none; }
.toast.show { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(-8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes popIn { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }

.header { padding: 1.5rem 1rem 1rem; display: flex; align-items: center; gap: 14px; }
.avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #6C5CE7, #3C3489); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; flex-shrink: 0; }
.header-info { flex: 1; }
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 13px; color: #7A7A72; margin-top: 2px; }
.level-badge { background: #EEEDFE; color: #3C3489; font-size: 15px; font-weight: 700; padding: 6px 14px; border-radius: 20px; }

.xp-section { padding: 0 1rem; margin-bottom: 20px; }
.xp-bar { height: 8px; background: #E8E8E4; border-radius: 4px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, #AFA9EC, #6C5CE7); border-radius: 4px; transition: width 0.5s ease; }
.xp-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: #7A7A72; }

.stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; padding: 0 1rem; margin-bottom: 16px; }
.stat { background: #fff; border: 0.5px solid #E8E8E4; border-radius: 12px; padding: 14px 12px; }
.stat-val { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.stat-label { font-size: 12px; color: #7A7A72; margin-top: 2px; }
.stat-sub { font-size: 11px; color: #AEAEA6; margin-top: 1px; }

.date-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; margin-bottom: 12px; background: #fff; border: 0.5px solid #E8E8E4; border-radius: 12px; margin-left: 1rem; margin-right: 1rem; height: 44px; }
.date-nav button { font-size: 18px; color: #6C5CE7; padding: 4px 10px; }
.date-nav-label { font-size: 13px; font-weight: 600; flex: 1; text-align: center; }
.date-nav-label.is-today { color: #6C5CE7; }
.date-nav-edit { font-size: 11px; color: #AEAEA6; }

.tabs { display: flex; padding: 0 1rem; margin-bottom: 16px; }
.tab { flex: 1; padding: 8px 0; font-size: 13px; font-weight: 400; color: #7A7A72; background: none; border: none; border-bottom: 1px solid #E8E8E4; text-align: center; }
.tab.active { font-weight: 600; color: #6C5CE7; border-bottom: 2px solid #6C5CE7; }

.tab-content { padding: 0 1rem; }
.tab-hint { font-size: 13px; color: #7A7A72; margin-bottom: 12px; line-height: 1.5; }

.act-card { width: 100%; margin-bottom: 8px; border-radius: 12px; background: #fff; border: 0.5px solid #E8E8E4; overflow: hidden; transition: all 0.15s; }
.act-card.active { background: #EEEDFE; border: 1.5px solid #AFA9EC; }
.act-main { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px; text-align: left; }
.act-icon { font-size: 22px; width: 32px; text-align: center; }
.act-info { flex: 1; }
.act-label { font-size: 14px; font-weight: 500; }
.act-card.active .act-label { color: #3C3489; }
.act-rule { font-size: 11px; color: #AEAEA6; margin-top: 2px; line-height: 1.4; }
.act-card.active .act-rule { color: #6C5CE7; }
.act-xp { font-size: 13px; font-weight: 600; color: #AEAEA6; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.act-card.active .act-xp { color: #6C5CE7; }
.act-check { width: 20px; height: 20px; border-radius: 50%; background: #6C5CE7; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }

.bonus-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px 14px 58px; border-top: 0.5px dashed #D5D0F5; }
.bonus-row label { font-size: 12px; color: #7A7A72; flex: 1; line-height: 1.4; }
.bonus-checkbox { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid #C7C2EE; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; }
.bonus-checkbox.checked { background: #6C5CE7; border-color: #6C5CE7; }

.summary { margin-top: 12px; padding: 14px; border-radius: 12px; background: #E1F5EE; font-size: 13px; color: #085041; line-height: 1.5; }

.week-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.dot { width: 44px; text-align: center; padding: 8px 0; border-radius: 10px; }
.dot.done { background: #6C5CE7; }
.dot.today { background: #EEEDFE; border: 2px solid #6C5CE7; }
.dot-label { font-size: 11px; font-weight: 500; color: #7A7A72; }
.dot.done .dot-label { color: #fff; }
.dot-xp { font-size: 10px; color: #ddd; margin-top: 2px; }
.dot-today-text { font-size: 10px; color: #6C5CE7; margin-top: 2px; }

.week-card { background: #fff; border: 0.5px solid #E8E8E4; border-radius: 12px; padding: 16px; }
.week-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.week-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
.week-row:last-child { margin-bottom: 0; }
.week-row span:first-child { color: #7A7A72; }
.week-row span:last-child { font-weight: 600; }

.history-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid #E8E8E4; cursor: pointer; }
.history-date { width: 42px; text-align: center; }
.history-day { font-size: 11px; color: #AEAEA6; }
.history-num { font-size: 16px; font-weight: 600; }
.history-icons { flex: 1; display: flex; gap: 6px; flex-wrap: wrap; }
.history-icons span { font-size: 18px; }
.history-xp { font-size: 13px; font-weight: 600; color: #7A7A72; }
.history-xp.today { color: #6C5CE7; }
.history-hint { font-size: 11px; color: #AEAEA6; text-align: center; margin-bottom: 8px; }

.empty { text-align: center; padding: 2rem 0; color: #AEAEA6; font-size: 14px; }

.export-section { padding: 1.5rem 1rem 0; }
.export-btn { width: 100%; padding: 12px; border-radius: 12px; background: #fff; border: 0.5px solid #E8E8E4; font-size: 13px; font-weight: 500; color: #7A7A72; display: flex; align-items: center; justify-content: center; gap: 8px; }
.export-panel { margin-top: 8px; padding: 14px; border-radius: 12px; background: #EEEDFE; font-size: 12px; color: #3C3489; line-height: 1.6; display: none; }
.export-panel.show { display: block; }
.export-panel-title { font-weight: 600; margin-bottom: 6px; }
.export-panel-hint { color: #7A7A72; font-size: 11px; margin-bottom: 6px; }
.export-actions { display: flex; gap: 8px; margin-top: 10px; }
.export-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.btn-copy { background: #6C5CE7; color: #fff; }
.btn-share { background: #3C3489; color: #fff; }

.roadmap { padding: 1.5rem 1rem 0; }
.roadmap-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #7A7A72; }
.roadmap-list { position: relative; padding-left: 20px; }
.roadmap-line { position: absolute; left: 7px; top: 4px; bottom: 4px; width: 2px; background: #E8E8E4; }
.roadmap-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; position: relative; }
.roadmap-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; position: absolute; left: -20px; display: flex; align-items: center; justify-content: center; background: #E8E8E4; }
.roadmap-dot.reached { background: #6C5CE7; }
.roadmap-dot.current { border: 3px solid #AFA9EC; }
.roadmap-dot span { color: #fff; font-size: 9px; }
.roadmap-label { flex: 1; margin-left: 4px; font-size: 12px; color: #AEAEA6; }
.roadmap-label.reached { color: #1A1A1A; }
.roadmap-label.current { font-weight: 600; }
.roadmap-xp { font-size: 11px; color: #AEAEA6; }

.reset-row { text-align: center; margin-top: 24px; }
.reset-btn { font-size: 12px; color: #AEAEA6; text-decoration: underline; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header">
  <div class="avatar">🧠</div>
  <div class="header-info">
    <div class="header-title">Brain training</div>
    <div class="header-sub" id="rank-title">Beginner</div>
  </div>
  <div class="level-badge" id="level-badge">Lv.1</div>
</div>

<div class="xp-section">
  <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
  <div class="xp-labels">
    <span id="xp-current">0 XP</span>
    <span id="xp-next">100 XP → Lv.2</span>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('today')" id="tab-today">Nhập liệu</button>
  <button class="tab" onclick="switchTab('week')" id="tab-week">Tuần này</button>
  <button class="tab" onclick="switchTab('history')" id="tab-history">Lịch sử</button>
</div>

<div id="content"></div>

<div class="export-section">
  <button class="export-btn" onclick="toggleExport()">📤 Export → Google Sheets</button>
  <div class="export-panel" id="export-panel">
    <div class="export-panel-title" id="export-count">Export 0 ngày</div>
    <div class="export-panel-hint">Copy → mở Google Sheets → chọn ô B8 → Paste</div>
    <div class="export-panel-hint">Cột: Ngày | Thứ | Đọc sách | Coursera | Nghe Eng | Self-talk | Quiz | Explore</div>
    <div class="export-actions">
      <button class="btn-copy" onclick="exportCopy()">📋 Copy</button>
      <button class="btn-share" onclick="exportShare()">📤 Share</button>
    </div>
  </div>
</div>

<div class="roadmap">
  <div class="roadmap-title">Roadmap</div>
  <div class="roadmap-list" id="roadmap"><div class="roadmap-line"></div></div>
</div>

<div class="reset-row">
  <button class="reset-btn" onclick="resetAll()">Reset toàn bộ</button>
</div>

<script>
// ===== CONFIG =====
const ACTS = [
  { key:"read", icon:"📖", label:"Đọc sách 15p", xp:15, mins:15,
    rule:"Đọc liên tục ≥15 phút, không lướt. Test: nói được 1 câu cụ thể vừa đọc?",
    hasBonus:true, bonusKey:"read_deep", bonusXp:10,
    bonusLabel:"Có đào sâu — hỏi AI / liên hệ thực tế (không chỉ tra nghĩa)" },
  { key:"course", icon:"🎓", label:"Coursera 30p", xp:30, mins:30,
    rule:"Hoàn thành ≥1 video/section thật. Test: note được 1 dòng tóm tắt?",
    hasBonus:true, bonusKey:"course_deep", bonusXp:10,
    bonusLabel:"Có đào sâu — hỏi AI / liên hệ thực tế (không chỉ tra nghĩa)" },
  { key:"listen", icon:"🎧", label:"Nghe Eng chủ động", xp:15, mins:20,
    rule:"Nghe có chủ đích + đã ghi 3 dòng (Topic/Key idea/New word) vào Notion.",
    hasBonus:false },
  { key:"selftalk", icon:"🗣️", label:"Self-talk tiếng Anh", xp:10, mins:5,
    rule:"Nói ra tiếng (không chỉ nghĩ) + tự phản biện 1 lần ('why?'/'how do I know?').",
    hasBonus:false },
  { key:"quiz", icon:"✍️", label:"Quiz / ghi chú", xp:20, mins:10,
    rule:"Viết từ TRÍ NHỚ trước, rồi mới check lại notes. Mở notes chép = không tính.",
    hasBonus:false },
  { key:"explore", icon:"💡", label:"Explore & Apply", xp:50, mins:45,
    rule:"Phải có output cụ thể lưu trong Notion (doc/template/conversation có kết luận).",
    hasBonus:false },
];
const DAY_NAMES = { 0:"CN",1:"T2",2:"T3",3:"T4",4:"T5",5:"T6",6:"T7" };
const RANKS = [
  {lv:1,title:"Beginner",xp:0},{lv:2,title:"Curious mind",xp:100},{lv:3,title:"Active reader",xp:300},
  {lv:4,title:"Knowledge seeker",xp:600},{lv:5,title:"Consistent learner",xp:1000},
  {lv:6,title:"Focused thinker",xp:1600},{lv:7,title:"Sharp analyst",xp:2400},
  {lv:8,title:"Deep specialist",xp:3500},{lv:9,title:"Expert mind",xp:5000},
  {lv:10,title:"Master learner",xp:7000}
];
const MARKET = [
  {min:0,label:"Bottom 30%",note:"Đa số dân văn phòng VN"},{min:100,label:"Top 50%",note:"Tách khỏi số đông"},
  {min:300,label:"Top 35%",note:"Hơn 2/3 dân văn phòng"},{min:600,label:"Top 20%",note:"Ngang junior PM quốc tế"},
  {min:1000,label:"Top 15%",note:"Ngang mid-level PM"},{min:1600,label:"Top 10%",note:"Senior PM territory"},
  {min:2400,label:"Top 5%",note:"Lead / Principal PM"},{min:3500,label:"Top 3%",note:"Director-level"},
  {min:5000,label:"Top 1%",note:"Exceptional"},{min:7000,label:"Top 0.5%",note:"Master — rất hiếm"}
];

const STORE_KEY = "brain-tracker-v6";
let state = { totalXP: 0, days: {} };
let currentTab = "today";
let viewDate = todayKey(); // date currently being edited/viewed in "today" tab

function todayKey() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function load() {
  try { const r = localStorage.getItem(STORE_KEY); if (r) state = JSON.parse(r); } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}
function formatDate(k) {
  const d = new Date(k);
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
}
function formatDateShort(k) {
  const d = new Date(k);
  return d.getDate()+"/"+(d.getMonth()+1);
}
function getLevel(xp) { let r=RANKS[0]; for(const x of RANKS) if(xp>=x.xp) r=x; return r; }
function getNext(xp) { for(const x of RANKS) if(xp<x.xp) return x; return null; }
function getMarket(xp) { let r=MARKET[0]; for(const m of MARKET) if(xp>=m.min) r=m; return r; }

function getDayXP(dk) {
  const d = state.days[dk];
  if (!d) return 0;
  let xp = 0;
  for (const act of ACTS) {
    if (d.acts && d.acts.includes(act.key)) {
      xp += act.xp;
      if (act.hasBonus && d.bonus && d.bonus[act.bonusKey]) xp += act.bonusXp;
    }
  }
  return xp;
}
function recalcTotalXP() {
  let total = 0;
  for (const dk in state.days) total += getDayXP(dk);
  state.totalXP = total;
}
function getStreak() {
  let s=0, d=new Date(), tk=todayKey();
  if(state.days[tk]&&state.days[tk].acts&&state.days[tk].acts.length>0){s=1;d.setDate(d.getDate()-1);}
  while(true){
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(state.days[k]&&state.days[k].acts&&state.days[k].acts.length>0){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}
function getTotalMins() {
  let t=0;
  for(const dk in state.days){
    const d=state.days[dk];
    if(!d.acts) continue;
    for(const a of d.acts){ const act=ACTS.find(x=>x.key===a); if(act) t+=act.mins; }
  }
  return t;
}
function getWeekDays() {
  const now=new Date(), dow=(now.getDay()+6)%7, mon=new Date(now);
  mon.setDate(now.getDate()-dow);
  const r=[], labels=["T2","T3","T4","T5","T6","T7","CN"];
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    r.push({key:k,label:labels[i],isToday:i===dow});
  }
  return r;
}
function showToast(msg) {
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

function ensureDay(dk) {
  if (!state.days[dk]) state.days[dk] = { acts: [], bonus: {} };
  if (!state.days[dk].bonus) state.days[dk].bonus = {};
}

function toggleAct(key) {
  const act = ACTS.find(a=>a.key===key);
  ensureDay(viewDate);
  const day = state.days[viewDate];
  const idx = day.acts.indexOf(key);
  if (idx >= 0) {
    day.acts.splice(idx, 1);
    if (act.hasBonus) delete day.bonus[act.bonusKey];
    showToast("−"+act.xp+" XP");
  } else {
    day.acts.push(key);
    showToast("+"+act.xp+" XP ✓  ("+act.rule.split('.')[0]+")");
  }
  cleanupDay(viewDate);
  recalcTotalXP(); save(); render();
}

function toggleBonus(bonusKey, parentKey) {
  ensureDay(viewDate);
  const day = state.days[viewDate];
  if (!day.acts.includes(parentKey)) { showToast("Tick hoạt động chính trước"); return; }
  if (day.bonus[bonusKey]) {
    delete day.bonus[bonusKey];
    showToast("Bỏ bonus đào sâu");
  } else {
    day.bonus[bonusKey] = true;
    showToast("+10 XP bonus — đào sâu ✓");
  }
  recalcTotalXP(); save(); render();
}

function cleanupDay(dk) {
  const day = state.days[dk];
  if (day && day.acts.length === 0) delete state.days[dk];
}

function changeViewDate(delta) {
  const d = new Date(viewDate);
  d.setDate(d.getDate() + delta);
  const newKey = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  if (newKey > todayKey()) { showToast("Không thể nhập ngày tương lai"); return; }
  viewDate = newKey;
  render();
}
function jumpToToday() { viewDate = todayKey(); render(); }
function jumpToDate(dk) { viewDate = dk; currentTab = "today"; render(); }

function switchTab(tab) { currentTab=tab; render(); }

function toggleExport() {
  const p=document.getElementById("export-panel");
  p.classList.toggle("show");
  document.getElementById("export-count").textContent="Export "+Object.keys(state.days).length+" ngày";
}
function buildExportText() {
  const sorted=Object.keys(state.days).sort();
  if(sorted.length===0) return null;
  let csv="";
  for(const dk of sorted){
    const day=state.days[dk], acts=day.acts, d=new Date(dk), dn=DAY_NAMES[d.getDay()];
    csv+=[formatDate(dk),dn,
      acts.includes("read")?1:"",acts.includes("course")?1:"",
      acts.includes("listen")?1:"",acts.includes("selftalk")?1:"",
      acts.includes("quiz")?1:"",acts.includes("explore")?1:""
    ].join("\t")+"\n";
  }
  return csv;
}
function exportCopy() {
  const csv=buildExportText();
  if(!csv){showToast("Chưa có data");return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(csv).then(()=>showToast("Đã copy! Paste vào ô B8")).catch(()=>fallbackCopy(csv));
  } else fallbackCopy(csv);
}
function fallbackCopy(text) {
  const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");showToast("Đã copy! Paste vào ô B8");}catch(e){showToast("Lỗi — thử Share");}
  document.body.removeChild(ta);
}
function exportShare() {
  const csv=buildExportText();
  if(!csv){showToast("Chưa có data");return;}
  if(navigator.share){ navigator.share({title:"Brain Training Export",text:csv}).catch(()=>{}); }
  else { exportCopy(); }
}
function resetAll() {
  if(confirm("Reset toàn bộ dữ liệu?")){
    state={totalXP:0,days:{}};viewDate=todayKey();save();render();showToast("Đã reset");
  }
}

function render() {
  const tk=todayKey();
  ensureDay(viewDate);
  const viewActs = state.days[viewDate].acts;
  const viewBonus = state.days[viewDate].bonus;
  const lv=getLevel(state.totalXP), next=getNext(state.totalXP), market=getMarket(state.totalXP);
  const streak=getStreak(), totalMins=getTotalMins(), totalHours=Math.round(totalMins/6)/10;
  const totalDays=Object.keys(state.days).length;
  const progress=next?Math.round((state.totalXP-lv.xp)/(next.xp-lv.xp)*100):100;
  const viewXP=getDayXP(viewDate);

  document.getElementById("rank-title").textContent=lv.title;
  document.getElementById("level-badge").textContent="Lv."+lv.lv;
  document.getElementById("xp-fill").style.width=progress+"%";
  document.getElementById("xp-current").textContent=state.totalXP+" XP";
  document.getElementById("xp-next").textContent=next?(next.xp-state.totalXP)+" XP → Lv."+next.lv:"MAX LEVEL 🏆";

  const statsData=[
    {val:market.label,label:"Thị trường",sub:market.note,color:"#6C5CE7"},
    {val:streak+" ngày",label:"Streak",sub:streak>=7?"On fire 🔥":streak>=3?"Đang nóng 🔥":"Keep going",color:"#1D9E75"},
    {val:totalHours+"h",label:"Tổng giờ học",sub:totalDays+" ngày đã log",color:"#1A1A1A"},
    {val:viewXP+"",label:"XP ngày này",sub:viewActs.length>0?viewActs.length+"/6 hoạt động":"Chưa log",color:"#6C5CE7"},
  ];
  document.getElementById("stats").innerHTML=statsData.map(s=>
    '<div class="stat"><div class="stat-val" style="color:'+s.color+'">'+s.val+'</div><div class="stat-label">'+s.label+'</div><div class="stat-sub">'+s.sub+'</div></div>'
  ).join("");

  ["today","week","history"].forEach(t=>{
    document.getElementById("tab-"+t).className="tab"+(currentTab===t?" active":"");
  });

  const el=document.getElementById("content");
  if(currentTab==="today"){
    const isToday = viewDate === tk;
    const d = new Date(viewDate);
    const dayLabel = DAY_NAMES[d.getDay()] + " " + formatDateShort(viewDate) + (isToday ? " (hôm nay)" : "");
    let h = '<div class="date-nav">';
    h += '<button onclick="changeViewDate(-1)">‹</button>';
    h += '<div class="date-nav-label'+(isToday?" is-today":"")+'">'+dayLabel+'</div>';
    h += isToday ? '<button onclick="changeViewDate(1)" style="opacity:0.3">›</button>' : '<button onclick="changeViewDate(1)">›</button>';
    h += '</div>';
    if (!isToday) {
      h += '<div style="text-align:center;margin-bottom:12px;"><button onclick="jumpToToday()" style="font-size:12px;color:#6C5CE7;text-decoration:underline;">← Về hôm nay</button></div>';
    }
    h += '<div class="tab-content"><div class="tab-hint">Tap để log — mỗi hoạt động có điều kiện riêng, đọc kỹ trước khi tick để khỏi tự lừa mình 😉</div>';
    for(const act of ACTS){
      const active=viewActs.includes(act.key);
      h+='<div class="act-card'+(active?" active":"")+'">';
      h+='<button class="act-main" onclick="toggleAct(\''+act.key+'\')">';
      h+='<span class="act-icon">'+act.icon+'</span>';
      h+='<div class="act-info"><div class="act-label">'+act.label+'</div><div class="act-rule">'+act.rule+'</div></div>';
      h+='<div class="act-xp">+'+act.xp+' XP'+(active?' <span class="act-check">✓</span>':'')+'</div>';
      h+='</button>';
      if (act.hasBonus) {
        const bChecked = !!viewBonus[act.bonusKey];
        h+='<div class="bonus-row" onclick="toggleBonus(\''+act.bonusKey+'\',\''+act.key+'\')">';
        h+='<div class="bonus-checkbox'+(bChecked?" checked":"")+'">'+(bChecked?"✓":"")+'</div>';
        h+='<label>'+act.bonusLabel+' (+'+act.bonusXp+' XP)</label>';
        h+='</div>';
      }
      h+='</div>';
    }
    if(viewActs.length>0){
      h+='<div class="summary"><strong>'+(isToday?"Hôm nay":"Ngày "+formatDateShort(viewDate))+': '+viewXP+' XP</strong> — '+(viewActs.length>=6?"Full combo! 💪":(6-viewActs.length)+" hoạt động nữa để full combo")+'</div>';
    }
    h+='</div>';
    el.innerHTML=h;

  } else if(currentTab==="week"){
    const wd=getWeekDays();
    let h='<div class="tab-content"><div class="week-dots">';
    for(const dd of wd){
      const dxp=getDayXP(dd.key), done=dxp>0;
      h+='<div class="dot'+(done?" done":dd.isToday?" today":"")+'" onclick="jumpToDate(\''+dd.key+'\')" style="cursor:pointer">';
      h+='<div class="dot-label">'+dd.label+'</div>';
      if(done) h+='<div class="dot-xp">'+dxp+'</div>';
      else if(dd.isToday) h+='<div class="dot-today-text">nay</div>';
      h+='</div>';
    }
    h+='</div>';
    const weekXP=wd.reduce((s,dd)=>s+getDayXP(dd.key),0);
    const weekActive=wd.filter(dd=>getDayXP(dd.key)>0).length;
    h+='<div class="week-card"><div class="week-title">Tuần này</div>';
    h+='<div class="week-row"><span>XP kiếm được</span><span style="color:#6C5CE7">'+weekXP+' XP</span></div>';
    h+='<div class="week-row"><span>Ngày active</span><span>'+weekActive+'/7</span></div>';
    h+='<div class="week-row"><span>Avg XP/ngày</span><span>'+(weekActive>0?Math.round(weekXP/weekActive):0)+'</span></div>';
    h+='</div></div>';
    el.innerHTML=h;

  } else {
    const days=Object.keys(state.days).sort().reverse().slice(0,30);
    if(days.length===0){
      el.innerHTML='<div class="tab-content"><div class="empty">Chưa có dữ liệu. Bắt đầu log hôm nay!</div></div>';
    } else {
      let h='<div class="tab-content"><div class="history-hint">Tap vào 1 ngày để sửa/bổ sung data ngày đó</div>';
      for(const dk of days){
        const day=state.days[dk], acts=day.acts, dxp=getDayXP(dk);
        const d=new Date(dk), dn=DAY_NAMES[d.getDay()], isT=dk===tk;
        h+='<div class="history-item" onclick="jumpToDate(\''+dk+'\')"><div class="history-date"><div class="history-day">'+dn+'</div><div class="history-num">'+d.getDate()+'/'+(d.getMonth()+1)+'</div></div>';
        h+='<div class="history-icons">';
        for(const a of acts){const act=ACTS.find(x=>x.key===a);if(act) h+='<span>'+act.icon+'</span>';}
        h+='</div><div class="history-xp'+(isT?" today":"")+'">+'+dxp+'</div></div>';
      }
      h+='</div>';
      el.innerHTML=h;
    }
  }

  let rm='<div class="roadmap-line"></div>';
  for(const r of RANKS){
    const reached=state.totalXP>=r.xp, current=lv.lv===r.lv;
    rm+='<div class="roadmap-item"><div class="roadmap-dot'+(reached?" reached":"")+(current?" current":"")+'">'+(reached?'<span>✓</span>':'')+'</div>';
    rm+='<div class="roadmap-label'+(reached?" reached":"")+(current?" current":"")+'">Lv.'+r.lv+' — '+r.title+'</div>';
    rm+='<div class="roadmap-xp">'+r.xp+' XP</div></div>';
  }
  document.getElementById("roadmap").innerHTML=rm;
}

load(); recalcTotalXP(); render();
</script>
</body>
</html>
